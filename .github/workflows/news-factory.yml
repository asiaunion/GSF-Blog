name: News Factory Autopilot

on:
  schedule:
    # 매일 UTC 23:00 (KST 08:00) 구동
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 트리거

jobs:
  run-scraper-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GITHUB_TOKEN으로 push 권한 설정

    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: main

      - name: "🐍 Setup Python 3.9"
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: "🤖 Run News Factory Bot"
        run: |
          python scripts/news_bot.py

      - name: "🚀 Commit and Push News Data"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-commit: Daily Market News from GSF-Factory Bot"
          file_pattern: "src/data/blog/**/*.md"
          branch: main
