name: Daily Vercel Rebuild

on:
  schedule:
    # 매일 UTC 23:00 (KST 08:00) 구동
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 트리거

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: "🚀 Trigger Vercel Deploy Hook"
        run: |
          # Vercel Deploy Hook 환경 변수 호출
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
